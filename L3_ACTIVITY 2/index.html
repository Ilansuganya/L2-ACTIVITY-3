<!DOCTYPE html>
<html>
    <head>
        <title> Lists in HTML </title>
    </head>
    <body>
        <h2> Ordered html lists </h2>
        <ol>
            <li> First item </li>
            <li> Second item </li>
            <li> Third item </li>
        </ol>
        <h2> Unordered html lists </h2>
        <ul>
            <li> First item </li>
            <li> Second item </li>
            <li> Third item </li>
        </ul>
        <h2> Definition html lists </h2>
        <dl> 
            <dt> Tea </dt>
            <dd> -hot drink </dd>
            <dt> Juice </dt>
            <dd> -ice drink </dd>
        </dl>
    </body>
</html>
